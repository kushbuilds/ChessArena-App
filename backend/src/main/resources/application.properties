server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:mem:chessarena;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=chessarena-super-secret-jwt-key-change-in-production-must-be-at-least-256-bits-long
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:5173

# Logging
logging.level.com.chessarena=DEBUG
logging.level.org.springframework.messaging=WARN
logging.level.org.springframework.web.socket=WARN
