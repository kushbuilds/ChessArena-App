server.port=8080

# MySQL Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/chessarena?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.jpa.show-sql=false

# JPA
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=${JWT_SECRET:chessarena-super-secret-jwt-key-change-in-production-must-be-at-least-256-bits-long}
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# Logging
logging.level.com.chessarena=INFO
logging.level.org.springframework.messaging=WARN
logging.level.org.springframework.web.socket=WARN
